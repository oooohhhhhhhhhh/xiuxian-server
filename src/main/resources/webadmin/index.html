<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>修仙游戏管理后台</title>
<style>
:root {
  --bg-deep: #060912;
  --bg-panel: #0d1220;
  --bg-card: #121a2e;
  --bg-hover: #1a2440;
  --border: #1e2a4a;
  --border-gold: #3d3220;
  --text: #e8ecf5;
  --text-secondary: #a0a8b8;
  --text-muted: #6b7a8f;
  --gold: #d4a853;
  --gold-dim: #9a7b38;
  --jade: #5bc87f;
  --red: #e55a5a;
  --blue: #4d95e0;
  --radius: 8px;
  --radius-lg: 12px;
  --shadow: 0 4px 16px rgba(0,0,0,0.3);
  --shadow-gold: 0 0 20px rgba(212,168,83,0.15);
  --transition: 0.25s cubic-bezier(0.4,0,0.2,1);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
  background: var(--bg-deep);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
}

@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
@keyframes glow { 0%, 100% { box-shadow: 0 0 5px rgba(212,168,83,0.3); } 50% { box-shadow: 0 0 20px rgba(212,168,83,0.6); } }

.layout {
  display: flex;
  min-height: 100vh;
}

.sidebar {
  width: 240px;
  background: var(--bg-panel);
  border-right: 1px solid var(--border);
  position: fixed;
  left: 0;
  top: 0;
  bottom: 0;
  padding: 20px 0;
  overflow-y: auto;
}

.sidebar-header {
  padding: 0 20px 20px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 20px;
}

.sidebar-header h1 {
  font-size: 18px;
  color: var(--gold);
  display: flex;
  align-items: center;
  gap: 8px;
  text-shadow: 0 0 10px rgba(212,168,83,0.3);
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 20px;
  color: var(--text-secondary);
  cursor: pointer;
  transition: var(--transition);
  font-size: 14px;
}

.nav-item:hover {
  background: var(--bg-hover);
  color: var(--text);
}

.nav-item.active {
  background: rgba(212,168,83,0.08);
  color: var(--gold);
  border-right: 2px solid var(--gold);
}

.nav-item.active::before {
  content: '';
  width: 3px;
  height: 16px;
  background: var(--gold);
  border-radius: 2px;
}

.nav-item span:first-child {
  font-size: 16px;
}

.main-content {
  flex: 1;
  margin-left: 240px;
  padding: 24px;
}

.top-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 24px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border);
}

.top-bar h2 {
  font-size: 22px;
  color: var(--gold);
  display: flex;
  align-items: center;
  gap: 8px;
}

.top-bar-right {
  display: flex;
  gap: 12px;
  align-items: center;
}

.btn {
  padding: 8px 16px;
  border-radius: var(--radius);
  border: none;
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
  transition: var(--transition);
  display: flex;
  align-items: center;
  gap: 6px;
}

.btn-primary {
  background: linear-gradient(135deg, #d4a853, #b8862e);
  color: #0a0d15;
}

.btn-primary:hover {
  box-shadow: var(--shadow-gold);
  transform: translateY(-1px);
}

.btn-action {
  background: var(--bg-card);
  color: var(--text);
  border: 1px solid var(--border);
}

.btn-action:hover {
  background: var(--bg-hover);
  border-color: var(--gold-dim);
}

.btn-danger {
  background: rgba(229,90,90,0.1);
  color: var(--red);
  border: 1px solid rgba(229,90,90,0.3);
}

.btn-danger:hover {
  background: rgba(229,90,90,0.2);
}

.btn-sm {
  padding: 4px 10px;
  font-size: 12px;
}

.card {
  background: var(--bg-card);
  border-radius: var(--radius-lg);
  padding: 20px;
  border: 1px solid var(--border);
  margin-bottom: 20px;
  transition: var(--transition);
}

.card:hover {
  border-color: var(--border-gold);
  box-shadow: var(--shadow-gold);
}

.card-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
}

.card-header h3 {
  font-size: 15px;
  color: var(--gold);
}

.stat-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 16px;
  margin-bottom: 24px;
}

.stat-card {
  background: var(--bg-card);
  border-radius: var(--radius-lg);
  padding: 20px;
  border: 1px solid var(--border);
  text-align: center;
  transition: var(--transition);
}

.stat-card:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow);
  border-color: var(--border-gold);
}

.stat-card .value {
  font-size: 32px;
  font-weight: 700;
  color: var(--gold);
  margin: 8px 0;
  text-shadow: 0 0 10px rgba(212,168,83,0.3);
}

.stat-card .label {
  font-size: 13px;
  color: var(--text-muted);
}

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}

th, td {
  padding: 12px;
  text-align: left;
  border-bottom: 1px solid var(--border);
}

th {
  background: rgba(212,168,83,0.05);
  color: var(--text-secondary);
  font-weight: 600;
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

tr:hover {
  background: var(--bg-hover);
}

input, textarea, select {
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 8px 12px;
  color: var(--text);
  font-size: 13px;
  outline: none;
  transition: var(--transition);
}

input:focus, textarea:focus, select:focus {
  border-color: var(--gold);
  box-shadow: 0 0 0 2px rgba(212,168,83,0.1);
}

input::placeholder { color: var(--text-muted); }

.search-box {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
}

.search-box input {
  flex: 1;
  max-width: 300px;
}

.badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 500;
}

.badge-gold {
  background: rgba(212,168,83,0.15);
  color: var(--gold);
}

.badge-jade {
  background: rgba(91,200,127,0.15);
  color: var(--jade);
}

.badge-red {
  background: rgba(229,90,90,0.15);
  color: var(--red);
}

.empty {
  text-align: center;
  padding: 40px;
  color: var(--text-muted);
}

.empty-icon {
  font-size: 48px;
  margin-bottom: 16px;
  opacity: 0.5;
}

.msg {
  padding: 12px 16px;
  border-radius: var(--radius);
  margin-bottom: 12px;
  font-size: 13px;
}

.msg-ok {
  background: rgba(91,200,127,0.1);
  color: var(--jade);
  border: 1px solid rgba(91,200,127,0.2);
}

.msg-err {
  background: rgba(229,90,90,0.1);
  color: var(--red);
  border: 1px solid rgba(229,90,90,0.2);
}

.modal-overlay {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(4px);
  z-index: 1000;
  justify-content: center;
  align-items: center;
}

.modal-overlay.show {
  display: flex;
  animation: fadeIn 0.2s ease;
}

.modal-content {
  background: var(--bg-card);
  border-radius: var(--radius-lg);
  padding: 24px;
  max-width: 600px;
  width: 90%;
  max-height: 80vh;
  overflow-y: auto;
  border: 1px solid var(--border);
  position: relative;
  animation: fadeIn 0.2s ease;
}

.modal-content h3 {
  color: var(--gold);
  margin-bottom: 16px;
  font-size: 18px;
}

.close {
  position: absolute;
  right: 16px;
  top: 16px;
  background: none;
  border: none;
  color: var(--text-muted);
  font-size: 20px;
  cursor: pointer;
  transition: var(--transition);
}

.close:hover {
  color: var(--text);
}

.form-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 12px;
}

.form-grid label {
  font-size: 12px;
  color: var(--text-muted);
  display: block;
  margin-bottom: 4px;
}

.actions {
  display: flex;
  gap: 10px;
  margin-top: 20px;
  justify-content: flex-end;
}

.row {
  display: flex;
  gap: 10px;
  align-items: center;
  flex-wrap: wrap;
}

.section-title {
  font-size: 14px;
  color: var(--gold);
  margin: 16px 0 10px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--border);
}

.page-info {
  font-size: 12px;
  color: var(--text-muted);
  margin-right: 10px;
}

.page-btn {
  padding: 4px 10px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text-secondary);
  font-size: 12px;
  cursor: pointer;
  transition: var(--transition);
}

.page-btn:hover:not(:disabled) {
  background: var(--bg-hover);
  color: var(--text);
}

.page-btn:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}

.db-edit-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 12px;
}

.db-edit-grid label {
  font-size: 12px;
  color: var(--text-secondary);
  display: block;
  margin-bottom: 4px;
}

.db-table-list {
  display: flex;
  flex-direction: column;
  gap: 4px;
  max-height: 400px;
  overflow-y: auto;
}

.db-table-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 14px;
  background: var(--bg-panel);
  border-radius: var(--radius);
  cursor: pointer;
  transition: var(--transition);
  border: 1px solid transparent;
}

.db-table-item:hover {
  background: var(--bg-hover);
}

.db-table-item.active {
  background: rgba(212,168,83,0.08);
  border-color: var(--border-gold);
  color: var(--gold);
}

.row-count {
  font-size: 11px;
  color: var(--text-muted);
  background: var(--bg-deep);
  padding: 2px 6px;
  border-radius: 4px;
}

.db-table-item.active .row-count {
  background: rgba(212,168,83,0.2);
  color: var(--gold);
}

@media (max-width: 768px) {
  .sidebar {
    width: 60px;
  }
  .sidebar-header h1 span:last-child, .nav-item span:last-child {
    display: none;
  }
  .main-content {
    margin-left: 60px;
    padding: 16px;
  }
  .stat-grid {
    grid-template-columns: repeat(2, 1fr);
  }
}
</style>
</head>
<body>

<div class="layout">
  <div class="sidebar">
    <div class="sidebar-header">
      <h1><span>🏮</span><span>修仙管理后台</span></h1>
    </div>
    <div class="nav-item active" onclick="switchTab('home')"><span>🏠</span><span>首页概览</span></div>
    <div class="nav-item" onclick="switchTab('players')"><span>👥</span><span>修士管理</span></div>
    <div class="nav-item" onclick="switchTab('database')"><span>🗄️</span><span>数据管理</span></div>
    <div class="nav-item" onclick="switchTab('commands')"><span>📜</span><span>指令调试</span></div>
    <div class="nav-item" onclick="switchTab('system')"><span>⚙️</span><span>系统管理</span></div>
  </div>

  <div class="main-content">
    <div class="top-bar">
      <h2 id="pageTitle">🏠 首页概览</h2>
      <div class="top-bar-right">
        <button class="btn btn-action" onclick="refreshAll()">🔄 刷新</button>
        <span style="color:var(--text-muted);font-size:13px" id="serverTime"></span>
      </div>
    </div>

    <div id="tab-home">
      <div class="stat-grid">
        <div class="stat-card"><div>👥</div><div class="value" id="statPlayers">0</div><div class="label">在线修士</div></div>
        <div class="stat-card"><div>💰</div><div class="value" id="statTotalGold">0</div><div class="label">总金币</div></div>
        <div class="stat-card"><div>💎</div><div class="value" id="statTotalLingshi">0</div><div class="label">总灵石</div></div>
        <div class="stat-card"><div>⚔️</div><div class="value" id="statAvgAttack">0</div><div class="label">平均攻击</div></div>
      </div>
      <div class="card">
        <div class="card-header"><h3>📊 实时状态</h3></div>
        <div id="quickStats" style="min-height:60px">加载中...</div>
      </div>
    </div>

    <div id="tab-players" style="display:none">
      <div class="card">
        <div class="card-header">
          <h3>👥 修士管理</h3>
          <div class="search-box">
            <input id="playerSearch" placeholder="搜索道号..." oninput="loadPlayers()">
            <button class="btn btn-primary" onclick="loadPlayers()">搜索</button>
          </div>
        </div>
        <div id="playerTable"></div>
      </div>
    </div>

    <div id="tab-database" style="display:none">
      <div class="card">
        <div class="card-header">
          <h3>🗄️ 数据管理</h3>
          <div class="row">
            <button class="btn btn-action" onclick="dbAction('backup')">💾 备份</button>
            <button class="btn btn-action" onclick="dbAction('stats')">📊 统计</button>
            <button class="btn btn-danger" onclick="if(confirm('确定清理空数据？'))dbAction('clean')">🧹 清理</button>
          </div>
        </div>
        <div id="dbMsg"></div>
      </div>
      <div class="card">
        <div class="card-header">
          <h3 id="dbTableTitle">📋 数据表</h3>
          <button class="btn btn-primary" id="btnDbAdd" style="display:none" onclick="openRowEdit()">➕ 新增行</button>
        </div>
        <div style="display:flex;gap:16px">
          <div style="width:250px;flex-shrink:0">
            <div id="dbTableList"></div>
          </div>
          <div style="flex:1">
            <div id="dbDataTable"></div>
            <div id="dbPagination" style="margin-top:16px"></div>
          </div>
        </div>
      </div>
    </div>

    <div id="tab-commands" style="display:none">
      <div class="card">
        <div class="card-header">
          <h3>📜 指令调试</h3>
          <div class="row">
            <button class="btn btn-primary" onclick="loadCommandStats()">📊 刷新指令统计</button>
            <button class="btn btn-action" onclick="loadDebugList()">📋 刷新指令列表</button>
          </div>
        </div>
        <div id="commandStats"></div>
      </div>
      <div class="card">
        <div class="card-header">
          <h3>🔧 快速调试</h3>
          <div class="search-box">
            <input id="cmdSearch" placeholder="搜索指令..." oninput="loadDebugList()">
          </div>
        </div>
        <div id="debugList"></div>
      </div>
    </div>

    <div id="tab-system" style="display:none">
      <div class="card">
        <div class="card-header"><h3>⚙️ 系统信息</h3></div>
        <div id="systemInfo"></div>
      </div>
      <div class="card">
        <div class="card-header"><h3>📝 发送公告</h3></div>
        <textarea id="announceText" style="width:100%;height:100px;margin-bottom:12px" placeholder="输入公告内容..."></textarea>
        <button class="btn btn-primary" onclick="sendAnnounce()">📢 发送公告</button>
        <div id="announceMsg"></div>
      </div>
      <div class="card">
        <div class="card-header"><h3>🔒 权限管理</h3></div>
        <div class="row">
          <input id="authUser" placeholder="QQ号">
          <input id="authLevel" placeholder="权限等级">
          <button class="btn btn-primary" onclick="setAuthority()">设置权限</button>
        </div>
        <div id="authMsg"></div>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal-content" id="modalContent"></div>
</div>

<script>
function $(id) { return document.getElementById(id); }
function $h(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

async function api(path, opts) {
  const res = await fetch(path, opts);
  if (!res.ok) throw new Error('HTTP ' + res.status);
  return await res.json();
}

function switchTab(tab) {
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('[onclick="switchTab(\'' + tab + '\')"]').forEach(el => el.classList.add('active'));
  document.querySelectorAll('[id^="tab-"]').forEach(el => el.style.display = 'none');
  $('tab-' + tab).style.display = 'block';
  
  const titles = { home:'🏠 首页概览', players:'👥 修士管理', database:'🗄️ 数据管理', commands:'📜 指令调试', system:'⚙️ 系统管理' };
  $('pageTitle').textContent = titles[tab];
  
  if (tab === 'home') loadHome();
  if (tab === 'players') loadPlayers();
  if (tab === 'database') loadDbTables();
  if (tab === 'commands') { loadCommandStats(); loadDebugList(); }
  if (tab === 'system') loadSystemInfo();
}

function refreshAll() {
  const tabs = ['home','players','database','commands','system'];
  for (const t of tabs) {
    const el = $('tab-' + t);
    if (el && el.style.display !== 'none') { switchTab(t); break; }
  }
}

async function loadHome() {
  try {
    const d = await api('/stats');
    $('statPlayers').textContent = d.online || 0;
    $('statTotalGold').textContent = (d.totalGold || 0).toLocaleString();
    $('statTotalLingshi').textContent = (d.totalLingshi || 0).toLocaleString();
    $('statAvgAttack').textContent = Math.round(d.avgAttack || 0);
  } catch (x) {}
  try {
    const p = await api('/players?limit=100');
    $('quickStats').innerHTML = '<div class="card" style="border:1px solid var(--border-gold)"><p>道统传承 · 已有 <b>' + (p.total||0) + '</b> 位修士踏入仙途</p></div>';
  } catch (x) {}
}

async function loadPlayers() {
  const q = $('playerSearch').value.trim();
  let url = '/players?limit=50';
  if (q) url += '&name=' + encodeURIComponent(q);
  try {
    const d = await api(url);
    if (!d.players || d.players.length === 0) {
      $('playerTable').innerHTML = '<div class="empty"><div class="empty-icon">☯</div>暂无修士记录</div>';
      return;
    }
    let h = '<table><tr><th>ID</th><th>道号</th><th>境界</th><th>灵根</th><th>等级</th><th>生命</th><th>攻击</th><th>防御</th><th>金币</th><th>灵石</th><th>状态</th><th>操作</th></tr>';
    for (const p of d.players) {
      const cultivating = p.cultivating ? '<span class="badge badge-gold">闭关中</span>' : '<span class="badge badge-jade">游历中</span>';
      h += '<tr>' +
        '<td style="color:var(--text-muted);font-size:11px">' + p.id + '</td>' +
        '<td style="color:var(--gold)">' + $h(p.name) + '</td>' +
        '<td>' + $h(p.realm) + '</td>' +
        '<td>' + $h(p.spiritualRoot||'') + ' <span style="color:var(--text-muted);font-size:11px">' + $h(p.rootTier||'') + '</span></td>' +
        '<td>' + p.level + '</td>' +
        '<td>' + p.hp + '/' + p.maxHp + '</td>' +
        '<td>' + p.attack + '</td>' +
        '<td>' + p.defense + '</td>' +
        '<td>' + p.gold + '</td>' +
        '<td>' + (p.spiritStones||0) + '</td>' +
        '<td>' + cultivating + '</td>' +
        '<td><button class="btn btn-action btn-sm" onclick="openPlayerDetail(' + p.id + ',\'' + $h(p.name) + '\')">详情</button></td>' +
        '</tr>';
    }
    h += '</table><p style="color:var(--text-muted);font-size:12px;margin-top:10px">共 ' + (d.total||0) + ' 位修士</p>';
    $('playerTable').innerHTML = h;
  } catch (x) { $('playerTable').innerHTML = '<div class="empty">加载失败</div>'; }
}

async function openPlayerDetail(id, name) {
  try {
    const d = await api('/players/' + id);
    const p = d.player;
    if (!p) { alert('玩家不存在'); return; }

    let itemsHtml = '<table><tr><th>物品</th><th>标识</th><th>数量</th></tr>';
    if (p.items) {
      for (const i of p.items) {
        itemsHtml += '<tr><td>' + $h(i.name) + '</td><td style="color:var(--text-muted);font-size:11px">' + i.key + '</td><td>' + i.qty + '</td></tr>';
      }
    }
    itemsHtml += '</table>';

    const html =
      '<button class="close" onclick="closeModal()">&times;</button>' +
      '<h3>☯ ' + $h(p.name) + ' <span style="font-size:12px;color:var(--text-muted);font-weight:normal">ID:' + p.id + ' · UID:' + p.userId + '</span></h3>' +
      '<div class="form-grid">' +
        '<div><label>生命值</label><input id="edHp" value="' + p.hp + '"></div>' +
        '<div><label>最大生命</label><input id="edMaxHp" value="' + p.maxHp + '"></div>' +
        '<div><label>法力值</label><input id="edMp" value="' + p.mp + '"></div>' +
        '<div><label>最大法力</label><input id="edMaxMp" value="' + p.maxMp + '"></div>' +
        '<div><label>攻击力</label><input id="edAtk" value="' + p.attack + '"></div>' +
        '<div><label>防御力</label><input id="edDef" value="' + p.defense + '"></div>' +
        '<div><label>速度</label><input id="edSpd" value="' + p.speed + '"></div>' +
        '<div><label>神识</label><input id="edSpi" value="' + p.spirit + '"></div>' +
        '<div><label>等级</label><input id="edLvl" value="' + p.level + '"></div>' +
        '<div><label>金币</label><input id="edGold" value="' + p.gold + '"></div>' +
        '<div><label>灵力</label><input id="edExp" value="' + p.experience + '"></div>' +
        '<div><label>境界</label><input id="edRealm" value="' + p.realm + '"></div>' +
      '</div>' +
      '<div style="margin-top:16px;padding:12px;background:rgba(212,168,83,0.05);border-radius:8px;font-size:13px;color:var(--text-secondary)">' +
        '灵根: <b style="color:var(--gold)">' + $h(p.spiritualRoot||'—') + '</b>' +
        '（' + $h(p.rootTier||'') + '）' +
        ' &nbsp;|&nbsp; 灵石: <b style="color:var(--jade)">' + (p.spiritStones||0) + '</b>' +
        ' &nbsp;|&nbsp; ' + (p.cultivating?'<span class="badge badge-gold">闭关中</span>':'<span class="badge badge-jade">游历中</span>') +
      '</div>' +
      '<div class="section-title" style="margin-top:20px">🪨 修改灵根</div>' +
      '<div class="row">' +
        '<select id="rootSel" style="width:200px"><option value="">--选择灵根--</option></select>' +
        '<button class="btn btn-action" onclick="setSpiritualRoot(' + id + ')">修改灵根</button>' +
        '<small style="color:var(--text-muted)">修改灵根会重新计算基础属性</small>' +
      '</div>' +
      '<div class="actions">' +
        '<button class="btn btn-primary" onclick="editPlayer(' + id + ')">保存修改</button>' +
      '</div>' +
      '<div class="section-title">🎁 发放资源</div>' +
      '<div class="row">' +
        '<input placeholder="金币" id="gvGold" style="width:80px">' +
        '<input placeholder="灵力" id="gvExp" style="width:80px">' +
        '<input placeholder="灵石" id="gvSS" style="width:80px">' +
        '<select id="gvItem"><option value="">--选物品--</option></select>' +
        '<input placeholder="数量" id="gvQty" style="width:60px">' +
        '<button class="btn btn-action" onclick="giveToPlayer(' + id + ')">发放</button>' +
      '</div>' +
      '<div class="section-title">🎒 背包物品</div>' +
      itemsHtml +
      '<div id="playerActionMsg"></div>';

    $('modalContent').innerHTML = html;
    $('modalOverlay').classList.add('show');

    try {
      const items = await api('/items');
      const sel = $('gvItem');
      for (const i of items.items) {
        sel.innerHTML += '<option value="' + i.key + '">' + $h(i.name) + '</option>';
      }
    } catch (x) {}

    try {
      const roots = await api('/spiritual-roots');
      const sel = $('rootSel');
      let lastTier = '';
      for (const r of roots.roots) {
        const tier = r.tierKey;
        if (tier !== lastTier) {
          if (lastTier !== '') sel.innerHTML += '<option disabled>──────────</option>';
          lastTier = tier;
        }
        sel.innerHTML += '<option value="' + r.name + '">' + $h(r.displayName) + ' [' + $h(r.tier) + ']</option>';
      }
    } catch (x) {}
  } catch (x) { alert('加载失败'); }
}

function closeModal() {
  $('modalOverlay').classList.remove('show');
}

$('modalOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

async function editPlayer(id) {
  const g = function(id) { return $(id).value; };
  const body = {
    hp: parseInt(g('edHp')), maxHp: parseInt(g('edMaxHp')),
    mp: parseInt(g('edMp')), maxMp: parseInt(g('edMaxMp')),
    attack: parseInt(g('edAtk')), defense: parseInt(g('edDef')),
    speed: parseInt(g('edSpd')), spirit: parseInt(g('edSpi')),
    level: parseInt(g('edLvl')), gold: parseInt(g('edGold')),
    experience: parseInt(g('edExp')), realm: parseInt(g('edRealm'))
  };
  try {
    const d = await api('/players/' + id + '/edit', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
    $('playerActionMsg').innerHTML = '<div class="msg msg-ok">' + $h(d.message) + '</div>';
    loadPlayers();
  } catch (x) { $('playerActionMsg').innerHTML = '<div class="msg msg-err">修改失败</div>'; }
}

async function giveToPlayer(id) {
  const body = {};
  const g = $('gvGold').value;
  const e = $('gvExp').value;
  const s = $('gvSS').value;
  const k = $('gvItem').value;
  const q = $('gvQty').value;
  if (g) body.gold = parseInt(g);
  if (e) body.exp = parseInt(e);
  if (s) body.spiritStones = parseInt(s);
  if (k && q) { body.itemKey = k; body.itemQty = parseInt(q); }
  try {
    const d = await api('/players/' + id + '/give', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
    $('playerActionMsg').innerHTML = '<div class="msg msg-ok">' + $h(d.message) + '</div>';
    loadPlayers();
  } catch (x) { $('playerActionMsg').innerHTML = '<div class="msg msg-err">发放失败</div>'; }
}

async function setSpiritualRoot(id) {
  const root = $('rootSel').value;
  if (!root) { alert('请选择灵根'); return; }
  if (!confirm('确定修改灵根？这会重新计算该玩家的基础属性。')) return;
  try {
    const d = await api('/players/' + id + '/spiritual-root', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({spiritualRoot:root}) });
    $('playerActionMsg').innerHTML = '<div class="msg msg-ok">' + $h(d.message) + '</div>';
    loadPlayers();
    closeModal();
    setTimeout(() => openPlayerDetail(id), 500);
  } catch (x) { $('playerActionMsg').innerHTML = '<div class="msg msg-err">修改灵根失败</div>'; }
}

let dbCurrentTable = null, dbColumns = null;
let dbPage = 0, dbPageSize = 50;

async function loadDbTables() {
  try {
    const d = await api('/db/tables');
    const list = $('dbTableList');
    if (!d.tables || d.tables.length === 0) {
      list.innerHTML = '<div class="empty">无数据表</div>';
      return;
    }
    let h = '';
    for (const t of d.tables) {
      h += '<div class="db-table-item' + (dbCurrentTable === t.name ? ' active' : '') + '" onclick="selectDbTable(\'' + $h(t.name) + '\')">' +
        '<span>' + $h(t.name) + '</span>' +
        '<span class="row-count">' + (t.rowCount >= 0 ? t.rowCount : '?') + '</span>' +
        '</div>';
    }
    list.innerHTML = h;
    if (dbCurrentTable) {
      loadDbTableData();
    }
  } catch (x) {
    $('dbTableList').innerHTML = '<div class="empty">加载失败</div>';
  }
}

function selectDbTable(name) {
  dbCurrentTable = name;
  dbPage = 0;
  $('dbTableTitle').textContent = '📄 ' + name;
  $('btnDbAdd').style.display = 'inline-block';
  document.querySelectorAll('.db-table-item').forEach(el => {
    el.classList.toggle('active', el.querySelector('span').textContent === name);
  });
  loadDbTableData();
}

async function loadDbTableData() {
  if (!dbCurrentTable) return;
  try {
    const d = await api('/db/tables/' + dbCurrentTable + '?limit=' + dbPageSize + '&offset=' + (dbPage * dbPageSize));
    dbColumns = d.columns || [];
    const rows = d.rows || [];
    const total = d.total || 0;

    let h = '<table><tr>';
    for (const col of dbColumns) {
      h += '<th>' + $h(col.name) + (col.pk ? ' 🔑' : '') + '</th>';
    }
    h += '<th>操作</th></tr>';

    for (const r of rows) {
      h += '<tr>';
      for (const col of dbColumns) {
        let val = r[col.name];
        let display = val === null ? '<span style="color:var(--text-muted)">NULL</span>' : $h(String(val));
        h += '<td>' + display + '</td>';
      }
      h += '<td>' +
        '<button class="btn btn-action btn-sm" onclick="openEditRow(\'' + dbCurrentTable + '\',' + r.id + ')">编辑</button> ' +
        '<button class="btn btn-danger btn-sm" onclick="deleteDbRow(\'' + dbCurrentTable + '\',' + r.id + ')">删除</button>' +
        '</td>';
      h += '</tr>';
    }
    h += '</table>';

    if (rows.length === 0) {
      h += '<div class="empty">该表暂无数据</div>';
    }

    $('dbDataTable').innerHTML = h;

    const totalPages = Math.max(1, Math.ceil(total / dbPageSize));
    let pag = '<span class="page-info">共 ' + total + ' 行 · 第 ' + (dbPage + 1) + '/' + totalPages + ' 页</span> ';
    if (totalPages > 1) {
      pag += '<button class="page-btn" onclick="dbPage=0;loadDbTableData()"' + (dbPage === 0 ? ' disabled' : '') + '>首页</button> ';
      pag += '<button class="page-btn" onclick="dbPage=Math.max(0,dbPage-1);loadDbTableData()"' + (dbPage === 0 ? ' disabled' : '') + '>上一页</button> ';
      pag += '<button class="page-btn" onclick="dbPage=Math.min(' + (totalPages - 1) + ',dbPage+1);loadDbTableData()"' + (dbPage >= totalPages - 1 ? ' disabled' : '') + '>下一页</button> ';
      pag += '<button class="page-btn" onclick="dbPage=' + (totalPages - 1) + ';loadDbTableData()"' + (dbPage >= totalPages - 1 ? ' disabled' : '') + '>末页</button>';
    }
    pag += ' <span style="font-size:12px;color:var(--text-muted)">每页</span> ' +
      '<select style="width:60px" onchange="dbPageSize=parseInt(this.value);dbPage=0;loadDbTableData()">' +
        '<option value="20"' + (dbPageSize === 20 ? ' selected' : '') + '>20</option>' +
        '<option value="50"' + (dbPageSize === 50 ? ' selected' : '') + '>50</option>' +
        '<option value="100"' + (dbPageSize === 100 ? ' selected' : '') + '>100</option>' +
      '</select> 行';
    $('dbPagination').innerHTML = pag;
  } catch (x) {
    $('dbDataTable').innerHTML = '<div class="empty">加载失败: ' + $h(x.message || '') + '</div>';
    $('dbPagination').innerHTML = '';
  }
}

function openRowEdit() {
  if (!dbColumns) return;
  let fieldsHtml = '';
  for (const col of dbColumns) {
    if (col.pk) continue;
    fieldsHtml += '<label>' + $h(col.name) + (col.notnull ? ' *' : '') + '</label>' +
      '<input id="dbFld_' + $h(col.name) + '" placeholder="' + $h(col.type || '') + '">';
  }
  const html =
    '<button class="close" onclick="closeModal()">&times;</button>' +
    '<h3>➕ 新增行 · ' + $h(dbCurrentTable || '') + '</h3>' +
    '<div class="db-edit-grid">' + fieldsHtml + '</div>' +
    '<div class="actions">' +
      '<button class="btn btn-primary" onclick="saveNewRow(\'' + dbCurrentTable + '\')">保存</button>' +
    '</div>';
  $('modalContent').innerHTML = html;
  $('modalOverlay').classList.add('show');
}

async function saveNewRow(tableName) {
  const data = {};
  for (const col of dbColumns) {
    if (col.pk) continue;
    const el = $('dbFld_' + $h(col.name));
    if (!el) continue;
    const val = el.value.trim();
    if (val === '' && col.notnull) {
      alert('字段 ' + col.name + ' 不能为空');
      return;
    }
    if (val !== '') {
      const type = (col.type || '').toLowerCase();
      if (type.includes('int') || type.includes('bigint') || type.includes('tinyint') || type.includes('smallint') || type.includes('decimal') || type.includes('float') || type.includes('double') || type.includes('real') || type.includes('numeric')) {
        data[col.name] = parseFloat(val);
      } else if (type.includes('bool')) {
        data[col.name] = val === 'true' || val === '1';
      } else {
        data[col.name] = val;
      }
    }
  }
  if (Object.keys(data).length === 0) {
    alert('请至少填写一个字段');
    return;
  }
  try {
    const d = await api('/db/tables/' + tableName, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });
    if (d.code === 200) {
      $('dbMsg').innerHTML = '<div class="msg msg-ok">新增成功 (ID: ' + d.id + ')</div>';
      closeModal();
      loadDbTableData();
      loadDbTables();
    } else {
      alert('新增失败: ' + (d.message || ''));
    }
  } catch (x) {
    alert('新增失败: ' + (x.message || ''));
  }
}

async function openEditRow(tableName, id) {
  try {
    const d = await api('/db/tables/' + tableName + '/' + id);
    const row = d.row;
    if (!row) { alert('记录不存在'); return; }

    let fieldsHtml = '';
    for (const col of dbColumns) {
      const val = row[col.name];
      const strVal = val === null ? '' : String(val);
      const disabled = col.pk ? ' disabled style="opacity:0.5"' : '';
      fieldsHtml += '<label>' + $h(col.name) + (col.pk ? ' 🔑' : '') + (col.notnull ? ' *' : '') + '</label>' +
        '<input id="dbFld_' + $h(col.name) + '" value="' + $h(strVal) + '"' + disabled + '>';
    }
    const html =
      '<button class="close" onclick="closeModal()">&times;</button>' +
      '<h3>✏️ 编辑行 · ' + $h(tableName) + ' · ID: ' + id + '</h3>' +
      '<div class="db-edit-grid">' + fieldsHtml + '</div>' +
      '<div class="actions">' +
        '<button class="btn btn-primary" onclick="saveEditRow(\'' + tableName + '\',' + id + ')">保存修改</button>' +
      '</div>';
    $('modalContent').innerHTML = html;
    $('modalOverlay').classList.add('show');
  } catch (x) {
    alert('加载失败: ' + (x.message || ''));
  }
}

async function saveEditRow(tableName, id) {
  const data = {};
  for (const col of dbColumns) {
    if (col.pk) continue;
    const el = $('dbFld_' + $h(col.name));
    if (!el) continue;
    const val = el.value.trim();
    if (val === '' && col.notnull) {
      alert('字段 ' + col.name + ' 不能为空');
      return;
    }
    if (val !== '') {
      const type = (col.type || '').toLowerCase();
      if (type.includes('int') || type.includes('bigint') || type.includes('tinyint') || type.includes('smallint') || type.includes('decimal') || type.includes('float') || type.includes('double') || type.includes('real') || type.includes('numeric')) {
        data[col.name] = parseFloat(val);
      } else if (type.includes('bool')) {
        data[col.name] = val === 'true' || val === '1';
      } else {
        data[col.name] = val;
      }
    } else {
      data[col.name] = null;
    }
  }
  if (Object.keys(data).length === 0) {
    alert('没有需要修改的字段');
    return;
  }
  try {
    const d = await api('/db/tables/' + tableName + '/' + id, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });
    if (d.code === 200) {
      $('dbMsg').innerHTML = '<div class="msg msg-ok">更新成功</div>';
      closeModal();
      loadDbTableData();
    } else {
      alert('更新失败: ' + (d.message || ''));
    }
  } catch (x) {
    alert('更新失败: ' + (x.message || ''));
  }
}

async function deleteDbRow(tableName, id) {
  if (!confirm('确定删除 ' + tableName + ' 表中 ID=' + id + ' 的记录吗？此操作不可撤销！')) return;
  try {
    const d = await api('/db/tables/' + tableName + '/' + id, { method: 'DELETE' });
    if (d.code === 200) {
      $('dbMsg').innerHTML = '<div class="msg msg-ok">删除成功</div>';
      loadDbTableData();
      loadDbTables();
    } else {
      alert('删除失败: ' + (d.message || ''));
    }
  } catch (x) {
    alert('删除失败: ' + (x.message || ''));
  }
}

async function dbAction(action) {
  try {
    const d = await api('/database/' + action, { method: 'POST' });
    let detail = '';
    if (d.detail) {
      for (const [k, v] of Object.entries(d.detail)) {
        detail += k + ': ' + v + ' 条; ';
      }
    }
    $('dbMsg').innerHTML = '<div class="msg msg-ok">' + $h(d.message) + '<br><small style="color:var(--text-muted)">' + $h(detail) + '</small></div>';
    loadDbTables();
  } catch (x) { $('dbMsg').innerHTML = '<div class="msg msg-err">操作失败</div>'; }
}

async function loadCommandStats() {
  try {
    const d = await api('/admin/commands/stats');
    let h = '<table><tr><th>指令</th><th>使用次数</th><th>最后使用</th></tr>';
    for (const c of d.stats) {
      h += '<tr><td>' + $h(c.name) + '</td><td>' + c.count + '</td><td>' + (c.lastUsed||'从未') + '</td></tr>';
    }
    h += '</table>';
    $('commandStats').innerHTML = h;
  } catch (x) { $('commandStats').innerHTML = '<div class="empty">加载失败</div>'; }
}

async function loadDebugList() {
  const q = $('cmdSearch').value.trim();
  try {
    const d = await api('/admin/debug/list');
    let cmds = d.commands || [];
    if (q) cmds = cmds.filter(c => c.name.toLowerCase().includes(q.toLowerCase()));
    let h = '<table><tr><th>指令</th><th>别名</th><th>描述</th><th>权限</th><th>测试</th></tr>';
    for (const c of cmds) {
      h += '<tr>' +
        '<td style="color:var(--gold)">' + $h(c.name) + '</td>' +
        '<td>' + $h(c.aliases?.join(', ') || '') + '</td>' +
        '<td>' + $h(c.description || '') + '</td>' +
        '<td>' + $h(c.permission || '无') + '</td>' +
        '<td><button class="btn btn-action btn-sm" onclick="testCommand(\'' + $h(c.name) + '\')">测试</button></td>' +
        '</tr>';
    }
    h += '</table>';
    $('debugList').innerHTML = h;
  } catch (x) { $('debugList').innerHTML = '<div class="empty">加载失败</div>'; }
}

async function testCommand(cmd) {
  if (!confirm('确定测试指令 ' + cmd + '？这将在服务器端执行该指令。')) return;
  try {
    const d = await api('/admin/debug/test', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ command: cmd, testMode: true })
    });
    alert('测试结果:\n' + (d.output || d.message || '执行完成'));
  } catch (x) {
    alert('测试失败: ' + (x.message || ''));
  }
}

async function loadSystemInfo() {
  try {
    const d = await api('/system/info');
    let h = '<table><tr><th>项目</th><th>值</th></tr>';
    for (const [k, v] of Object.entries(d)) {
      h += '<tr><td>' + $h(k) + '</td><td>' + $h(String(v)) + '</td></tr>';
    }
    h += '</table>';
    $('systemInfo').innerHTML = h;
  } catch (x) { $('systemInfo').innerHTML = '<div class="empty">加载失败</div>'; }
}

async function sendAnnounce() {
  const text = $('announceText').value.trim();
  if (!text) { alert('请输入公告内容'); return; }
  try {
    const d = await api('/announce', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text: text })
    });
    $('announceMsg').innerHTML = '<div class="msg msg-ok">' + $h(d.message) + '</div>';
    $('announceText').value = '';
  } catch (x) { $('announceMsg').innerHTML = '<div class="msg msg-err">发送失败</div>'; }
}

async function setAuthority() {
  const user = $('authUser').value.trim();
  const level = $('authLevel').value.trim();
  if (!user || !level) { alert('请填写QQ号和权限等级'); return; }
  try {
    const d = await api('/admin/authority', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ userId: user, level: level })
    });
    $('authMsg').innerHTML = '<div class="msg msg-ok">' + $h(d.message) + '</div>';
    $('authUser').value = '';
    $('authLevel').value = '';
  } catch (x) { $('authMsg').innerHTML = '<div class="msg msg-err">设置失败</div>'; }
}

function updateTime() {
  $('serverTime').textContent = new Date().toLocaleString('zh-CN');
}

setInterval(updateTime, 1000);
updateTime();
loadHome();
