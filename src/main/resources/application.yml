# ========================================
#  修仙世界 - 服务器配置文件
# ========================================
#  启动时自动生成，修改后重启即可生效

# ---- 应用 ----
app:
  name: 修仙世界

# ---- 服务器 ----
server:
  host: 127.0.0.1
  port: 8080

# ---- 数据库 ----
database:
  type: mysql
  url: jdbc:mysql://localhost:3306/xiuxian?useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci
  username: root
  password: root
  sqlite_path: xiuxian.db

# ---- JWT ----
jwt:
  secret: xiuxian-game-jwt-secret-key-2026-must-be-at-least-256-bits-long!!

# ---- 管理后台 ----
admin:
  username: admin
  password: admin123

# ---- 邮件 (SMTP) ----
smtp:
  host: smtp.qq.com
  port: 587
  username: ""
  password: ""
  from: ""
  auth: true
  starttls: true

# ---- 注册验证码 ----
verify_code:
  enabled: true
  allowed_domains:
    - qq.com
    - 163.com
    - 126.com
    - gmail.com
    - outlook.com
    - hotmail.com
  rate_limit_seconds: 60

# ---- OneBot QQ Bot ----
onebot:
  enabled: true
  port: 6700
  # 运行模式: ws_server(WebSocket服务端) / screenshot(截图模拟真人操作)
  mode: ws_server
  # 消息发送方式: text(普通文字) / chat_record(聊天记录/合并转发)
  # 注意: screenshot 模式只使用 text 方式
  send_mode: text
  # 截图模式配置 (仅 mode=screenshot 时生效)
  screenshot:
    # 目标窗口标题匹配关键词 (如 "QQ")
    window_title: ""
    # 截图轮询间隔 (毫秒)
    poll_interval: 2000

# ---- Minecraft 适配器 ----
minecraft:
  adapter:
    # 是否启用 Minecraft 适配器
    enabled: false
  # 服务端 jar 文件路径（绝对路径或相对于项目根目录）
  jar_path: ""
  # 服务端运行目录（plugins/等资源放这里）
  server_dir: mc_server
  # Java 可执行文件路径（留空则使用系统 PATH 中的 java）
  java_path: java
  # 最小/最大 JVM 堆内存 (MB)
  min_memory_mb: 512
  max_memory_mb: 1024
  # 启动 Minecraft 服务端时是否自动开始（false = 手动通过后台启动）
  auto_start: false
  # 等待服务端就绪的超时秒数
  ready_timeout_seconds: 120
  # 额外 JVM 参数（空格分隔），例: "-XX:+UseG1GC -Dfile.encoding=UTF-8"
  extra_jvm_args: ""
  # 在线模式: true = 正版验证(UUID走Mojang API), false = 离线模式(UUID由名字生成)
  online_mode: false
  # 指令前缀（避免和其他插件冲突）。如 "xiuxian" 则玩家用 /xiuxian status，
  # 空串 = 无前缀，所有 /xxx 都走修仙适配器
  command_prefix: "xiuxian"

# ---- 日志 ----
logging:
  level: DEBUG
  dir: log
  color: true

# ---- 背包系统 ----
inventory:
  # 基础背包容量（物品种类数）
  base_capacity: 30
  # 每级增加的背包容量
  capacity_per_level: 5

# ---- 性能 / 低内存优化 ----
performance:
  # JVM 启动参数建议 (java -Xms128m -Xmx256m -XX:+UseSerialGC ...)
  # 可用 start-low-memory.bat 一键启动低内存模式
  # 低内存模式: 启用后自动缩小连接池、线程池、缓冲区
  low_memory: true
  # HikariCP 连接池最大连接数 (MySQL 默认用此值; SQLite 固定为 1)
  db_pool_max: 4
  # 内存日志最大保留条数
  memory_log_entries: 200
  # Grizzly IO 工作线程数 (0 = CPU 核心数)
  grizzly_io_threads: 1
  # Grizzly 核心工作线程数
  grizzly_worker_cores: 1
  # Grizzly 最大工作线程数
  grizzly_worker_max: 2
