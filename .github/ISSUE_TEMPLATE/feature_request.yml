name: 功能请求
description: 提出新功能或改进建议
title: "[Feature] "
labels:
  - feature
body:
  - type: textarea
    id: description
    attributes:
      label: 功能描述
      description: 请清晰描述你想要的功能或改进
      placeholder: 描述功能...
    validations:
      required: true

  - type: checkboxes
    id: systems
    attributes:
      label: 涉及的游戏系统
      description: 请选择相关的游戏系统
      options:
        - label: 修炼系统（打坐/突破/心魔）
        - label: 战斗系统（切磋/PVP/技能）
        - label: 秘境探索
        - label: 坊市交易
        - label: 种田系统
        - label: 装备系统
        - label: 背包/物品
        - label: 经济系统（金币/灵石/灵庄）
        - label: 社交系统（查人/好友）
        - label: 宗门系统
        - label: 每日/日常系统
        - label: 其他（请说明）

  - type: textarea
    id: background
    attributes:
      label: 需求背景
      description: 描述这个功能想要解决什么问题或满足什么需求
      placeholder: 描述需求背景...

  - type: textarea
    id: impact
    attributes:
      label: 期望的玩法影响
      description: 描述这个功能对游戏玩法的影响
      placeholder: |
        - 是否会影响玩家之间的平衡性？
        - 是否会改变现有游戏机制？
        - 是否需要新增指令或修改现有指令？

  - type: textarea
    id: suggestions
    attributes:
      label: 实现建议
      description: 如果你有具体的实现想法或建议，请描述
      placeholder: 描述实现建议...

  - type: textarea
    id: examples
    attributes:
      label: 参考示例（可选）
      description: 如果有类似游戏或功能可以参考，请说明
      placeholder: 描述参考示例...

  - type: textarea
    id: additional
    attributes:
      label: 其他信息
      description: 任何其他相关信息或想法