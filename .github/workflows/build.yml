name: Build and Deploy

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  packages: write

env:
  GITHUB_REPOSITORY_URL: https://maven.pkg.github.com/oooohhhhhhhhhh/xiuxian-server
  GIT_COMMIT_SHA: ${{ github.sha }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 23
        uses: actions/setup-java@v4
        with:
          java-version: '23'
          distribution: 'temurin'
          cache: maven

      - name: Configure Maven settings
        run: |
          mkdir -p ~/.m2
          echo "<settings><servers><server><id>github</id><username>$GITHUB_ACTOR</username><password>$GITHUB_TOKEN</password></server></servers></settings>" > ~/.m2/settings.xml
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update version and deploy
        run: |
          BASE_VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          NEW_VERSION="${BASE_VERSION%-SNAPSHOT}-$GIT_COMMIT_SHA"
          mvn versions:set -DnewVersion=$NEW_VERSION -DgenerateBackupPoms=false -B
          mvn clean deploy -DskipTests -B -P github

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: game-server-jar
          path: target/*.jar