name: Build and Deploy

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 23
        uses: actions/setup-java@v4
        with:
          java-version: '23'
          distribution: 'temurin'
          cache: maven

      - name: Install dependencies
        run: mvn dependency:go-offline -B

      - name: Compile code
        run: mvn compile -B

      - name: Run tests
        run: mvn test -B
        continue-on-error: true

      - name: Package JAR
        run: mvn package -DskipTests -B

      - name: Verify JAR file
        run: |
          JAR_FILE=$(find target -name "*.jar" -type f | head -n 1)
          if [ -z "$JAR_FILE" ]; then
            echo "Error: No JAR file found in target directory"
            exit 1
          fi
          echo "Found JAR file: $JAR_FILE"
          ls -la "$JAR_FILE"
          echo "JAR_FILE=$JAR_FILE" >> $GITHUB_ENV

      - name: Configure Maven settings
        run: |
          mkdir -p ~/.m2
          echo '<settings>' > ~/.m2/settings.xml
          echo '  <servers>' >> ~/.m2/settings.xml
          echo '    <server>' >> ~/.m2/settings.xml
          echo '      <id>github</id>' >> ~/.m2/settings.xml
          echo "      <username>${{ github.actor }}</username>" >> ~/.m2/settings.xml
          echo "      <password>${{ secrets.GITHUB_TOKEN }}</password>" >> ~/.m2/settings.xml
          echo '    </server>' >> ~/.m2/settings.xml
          echo '  </servers>' >> ~/.m2/settings.xml
          echo '</settings>' >> ~/.m2/settings.xml

      - name: Deploy to GitHub Packages
        run: mvn deploy -DskipTests -B -Dmaven.deploy.skip=false

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: game-server-jar
          path: ${{ env.JAR_FILE }}

      - name: Create summary
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "✅ Build successful" >> $GITHUB_STEP_SUMMARY
          echo "📦 Artifact: ${{ env.JAR_FILE }}" >> $GITHUB_STEP_SUMMARY
          echo "🔄 Branch: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "👤 Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY