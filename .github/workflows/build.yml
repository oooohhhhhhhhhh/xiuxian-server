name: Build and Deploy

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 23
        uses: actions/setup-java@v4
        with:
          java-version: '23'
          distribution: 'temurin'
          cache: maven
          server-id: github
          server-password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: mvn dependency:go-offline -B

      - name: Compile code
        run: mvn compile -B

      - name: Run tests
        run: mvn test -B
        continue-on-error: true

      - name: Package JAR
        run: mvn package -DskipTests -B

      - name: Verify JAR file
        run: |
          JAR_FILE=$(find target -name "*.jar" -type f | head -n 1)
          if [ -z "$JAR_FILE" ]; then
            echo "Error: No JAR file found in target directory"
            exit 1
          fi
          echo "Found JAR file: $JAR_FILE"
          ls -la "$JAR_FILE"
          echo "JAR_FILE=$JAR_FILE" >> $GITHUB_ENV

      - name: Deploy to GitHub Packages
        run: mvn deploy -DskipTests -B -Dmaven.deploy.skip=false

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: game-server-jar
          path: ${{ env.JAR_FILE }}

      - name: Create summary
        uses: actions/github-script@v7
        with:
          script: |
            core.summary.addHeading('Build Summary')
            core.summary.addRaw('✅ Build successful', true)
            core.summary.addRaw(`📦 Artifact: ${process.env.JAR_FILE}`, true)
            core.summary.addRaw(`🔄 Branch: ${context.ref.replace('refs/heads/', '')}`, true)
            core.summary.addRaw(`👤 Commit: ${context.sha}`, true)
            await core.summary.write()