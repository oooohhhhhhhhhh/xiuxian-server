name: Build and Deploy

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  packages: write

env:
  GITHUB_REPOSITORY_URL: https://maven.pkg.github.com/oooohhhhhhhhhh/xiuxian-server
  PROJECT_VERSION: V1.4.1-${{ github.sha }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 23
        uses: actions/setup-java@v4
        with:
          java-version: '23'
          distribution: 'temurin'
          cache: maven

      - name: Configure Maven settings
        run: |
          mkdir -p ~/.m2
          echo "<settings><servers><server><id>github</id><username>$GITHUB_ACTOR</username><password>$GITHUB_TOKEN</password></server></servers></settings>" > ~/.m2/settings.xml
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and deploy
        run: mvn clean deploy -DskipTests -B -P github -Dproject.version=$PROJECT_VERSION

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: game-server-jar
          path: target/*.jar